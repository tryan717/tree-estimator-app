<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tree Estimate Calculator</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

input[type=text],
input[type=number] {
  appearance: none;
  -moz-appearance: textfield;
}
</style>
</head>

<body class="bg-gray-100 p-4">

<div class="max-w-md mx-auto space-y-4">

<div class="bg-white p-5 rounded-3xl shadow-xl space-y-4">

<h1 class="text-2xl font-bold">Tree Estimate Calculator</h1>

<p class="text-sm text-gray-500">
Internal Production-Based Estimator
</p>

<div>
<label class="block text-sm font-medium mb-1">Customer Name</label>
<input
id="customerName"
type="text"
placeholder="Enter customer name"
class="w-full border rounded-xl p-3 appearance-none"
>
</div>

<div>
<label class="block text-sm font-medium mb-1">Customer Address</label>
<input
id="customerAddress"
type="text"
placeholder="Enter customer address"
class="w-full border rounded-xl p-3 appearance-none"
>
</div>

</div>

<div class="bg-white p-5 rounded-3xl shadow-xl space-y-4">

<h2 class="text-lg font-semibold">Production Block</h2>

<select id="productionBlock" class="w-full border rounded-xl p-3">
<option value="815">1/4 Day - $815</option>
<option value="1500">1/2 Day - $1,500</option>
<option value="2200">3/4 Day - $2,200</option>
<option value="2850">1 Day - $2,850</option>
<option value="5550">2 Day - $5,550</option>
<option value="8250">3 Day - $8,250</option>
<option value="10950">4 Day - $10,950</option>
<option value="13650">5 Day - $13,650</option>
</select>

<div>
<label class="block text-sm font-medium mb-1">
Additional Manual Hours
</label>

<input
id="manualHours"
type="text"
placeholder="Enter hours directly"
class="w-full border rounded-xl p-3 appearance-none"
>

<p id="hourlyRateDisplay" class="text-sm text-gray-500 mt-2">
Hourly Rate: $285/hr
</p>
</div>

</div>

<div class="bg-white p-5 rounded-3xl shadow-xl space-y-4">

<h2 class="text-lg font-semibold">Conditions</h2>

<div>
<label class="block text-sm font-medium mb-1">Access</label>

<select id="access" class="w-full border rounded-xl p-3">
<option value="1">No Machine Required / Easy Hand Work (+0%)</option>
<option value="1.12">Machine Assist w/ Easy Access or Moderate Hand Work (+12%)</option>
<option value="1.17">Machine Assist w/ Moderate Access or Heavy Hand Work (+17%)</option>
<option value="1.22">Machine Assist w/ Hard Access or Extreme Hand Work (+22%)</option>
<option value="1.27">Machine Assist w/ Very Difficult Access (+27%)</option>
</select>
</div>

<div>
<label class="block text-sm font-medium mb-1">Rigging / Climbing</label>

<select id="rigging" class="w-full border rounded-xl p-3">
<option value="1">No Climbing (+0%)</option>
<option value="1.05">Minimal Rigging / Pull Rope (+5%)</option>
<option value="1.10">Light Rigging (+10%)</option>
<option value="1.15">Moderate Rigging (+15%)</option>
<option value="1.20">Technical Rigging (+20%)</option>
</select>
</div>

<div>
<label class="block text-sm font-medium mb-1">Property Protection</label>

<select id="protection" class="w-full border rounded-xl p-3">
<option value="1">Open Area (+0%)</option>
<option value="1.10">Standard Residential (+10%)</option>
<option value="1.16">Tight Protection (+16%)</option>
<option value="1.22">High Consequence (+22%)</option>
</select>
</div>

</div>

<div class="bg-white p-5 rounded-3xl shadow-xl space-y-4">

<h2 class="text-lg font-semibold">Variable Costs</h2>

<div>
<label class="block text-sm font-medium mb-1">Dump Fees</label>
<input id="dumpFees" type="text" class="w-full border rounded-xl p-3 appearance-none">
</div>

<div>
<label class="block text-sm font-medium mb-1">Crane Fees</label>
<input id="craneFees" type="text" class="w-full border rounded-xl p-3 appearance-none">
</div>

<div>
<label class="block text-sm font-medium mb-1">Fuel Surcharge</label>
<input id="fuelSurcharge" type="text" class="w-full border rounded-xl p-3 appearance-none">
</div>

<div>
<label class="block text-sm font-medium mb-1">Other Fees</label>
<input id="otherFees" type="text" class="w-full border rounded-xl p-3 appearance-none">
</div>

<div>
<label class="block text-sm font-medium mb-1">Discount</label>
<input id="discount" type="text" class="w-full border rounded-xl p-3 appearance-none" placeholder="Enter discount amount">
</div>

</div>

<div class="bg-white p-5 rounded-3xl shadow-xl space-y-4">

<h2 class="text-lg font-semibold">Export</h2>

<button id="downloadPdf"
class="w-full bg-blue-600 text-white rounded-xl p-3 font-semibold">
Download Estimate PDF
</button>

</div>

<div class="bg-black text-white p-5 rounded-3xl shadow-xl space-y-3">

<h2 class="text-lg font-semibold">Estimate Summary</h2>

<div class="flex justify-between">
<span>Base Production</span>
<span id="baseProduction">$0</span>
</div>

<div class="flex justify-between">
<span>Manual Add-On</span>
<span id="manualAddon">$0</span>
</div>

<div class="flex justify-between">
<span>Multiplier</span>
<span id="multiplier">0</span>
</div>

<div class="flex justify-between">
<span>Variable Costs</span>
<span id="variableCosts">$0</span>
</div>

<div class="border-t border-gray-700 pt-4 space-y-2">

<div class="flex justify-between font-bold text-lg">
<span>Low Range</span>
<span id="lowRange">$0</span>
</div>

<div class="flex justify-between font-bold text-lg">
<span>Normal Range</span>
<span id="normalRange">$0</span>
</div>

<div class="flex justify-between font-bold text-lg">
<span>High Range</span>
<span id="highRange">$0</span>
</div>

</div>

</div>

</div>

<script>

function money(value) {
  return '$' + Number(value).toFixed(2);
}

function calculate() {

  var productionBlock =
    parseFloat(document.getElementById('productionBlock').value) || 0;

  var manualHours =
    parseFloat(document.getElementById('manualHours').value) || 0;

  var access =
    parseFloat(document.getElementById('access').value) || 1;

  var rigging =
    parseFloat(document.getElementById('rigging').value) || 1;

  var protection =
    parseFloat(document.getElementById('protection').value) || 1;

  var dumpFees =
    parseFloat(document.getElementById('dumpFees').value) || 0;

  var craneFees =
    parseFloat(document.getElementById('craneFees').value) || 0;

  var fuelSurcharge =
    parseFloat(document.getElementById('fuelSurcharge').value) || 0;

  var otherFees =
    parseFloat(document.getElementById('otherFees').value) || 0;

  var discount =
    parseFloat(document.getElementById('discount').value) || 0;

  var hourlyRate;

  if (productionBlock < 2850) {
    hourlyRate = 300;
  } else {
    hourlyRate = 285;
  }

  document.getElementById('hourlyRateDisplay').innerHTML =
    'Hourly Rate: $' + hourlyRate + '/hr';

  var manualAddon =
    manualHours * hourlyRate;

  var baseProduction =
    productionBlock + manualAddon;

  var multiplier =
    access * rigging * protection;

  var productionValue =
    baseProduction * multiplier;

  var variableCosts =
    dumpFees + craneFees + fuelSurcharge + otherFees;

  var total =
    productionValue + variableCosts - discount;

  var lowRange =
    total * 0.94;

  var highRange =
    total * 1.06;

  document.getElementById('baseProduction').innerHTML =
    money(baseProduction);

  document.getElementById('manualAddon').innerHTML =
    money(manualAddon);

  document.getElementById('multiplier').innerHTML =
    multiplier.toFixed(3);

  document.getElementById('variableCosts').innerHTML =
    money(variableCosts);

  document.getElementById('lowRange').innerHTML =
    money(lowRange);

  document.getElementById('normalRange').innerHTML =
    money(total);

  document.getElementById('highRange').innerHTML =
    money(highRange);
}

var controls = document.querySelectorAll('input, select');

for (var i = 0; i < controls.length; i++) {
  controls[i].addEventListener('input', calculate);
}

calculate();

async function generatePdf() {

  const jsPDF = window.jspdf.jsPDF;

  const doc = new jsPDF();

  const customerName =
    document.getElementById('customerName').value || 'N/A';

  const customerAddress =
    document.getElementById('customerAddress').value || 'N/A';

  const lowRange =
    document.getElementById('lowRange').innerText;

  const normalRange =
    document.getElementById('normalRange').innerText;

  const highRange =
    document.getElementById('highRange').innerText;

  doc.setFontSize(20);
  doc.text('Tree Service Estimate', 20, 20);

  doc.setFontSize(12);

  doc.text('Customer: ' + customerName, 20, 35);
  doc.text('Address: ' + customerAddress, 20, 45);

  doc.text('Low Range: ' + lowRange, 20, 65);
  doc.text('Normal Range: ' + normalRange, 20, 75);
  doc.text('High Range: ' + highRange, 20, 85);

  return doc;
}

document.getElementById('downloadPdf').addEventListener('click', async function() {

  const doc = await generatePdf();

  doc.save('tree-estimate.pdf');
});

</script>

</body>
</html>
